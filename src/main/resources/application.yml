# ============================================================
# Todo AI Agent - Application Configuration
# ============================================================

server:
  port: 8081

spring:
  application:
    name: todo-ai-agent

  # ==========================================================
  # Spring AI - OpenAI Configuration
  # ==========================================================
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          # max-tokens: 2048
          temperature: 0.7
      # --------------------------------------------------------
      # Embedding model — used by EmbeddingService to generate
      # vector representations of todo content for pgvector.
      # text-embedding-3-small is faster/cheaper; produces 1536d vectors.
      # text-embedding-ada-002 is the classic option (also 1536d).
      # --------------------------------------------------------
      embedding:
        options:
          model: text-embedding-3-small

    # ==========================================================
    # Vector Store - pgvector
    # Spring AI auto-configures PgVectorStore when the starter is
    # on the classpath. Our VectorStoreConfig bean customises it.
    # ==========================================================
    vectorstore:
      pgvector:
        dimensions: 1536
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        initialize-schema: true
        vector-table-name: todo_vector_store
  # ==========================================================
  # Database - Postgres
  # ==========================================================
  datasource:
    url: jdbc:postgresql://localhost:5432/todo_ai_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.example.todoai: DEBUG
    org.springframework.ai: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n"