# ============================================================
# Todo AI Agent - Application Configuration
# ============================================================

server:
  port: 8081

spring:
  application:
    name: todo-ai-agent

  # ==========================================================
  # Spring AI - OpenAI Configuration
  # ==========================================================
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          # max-tokens: 2048
          temperature: 0.7

  # ==========================================================
  # Database - Postgres
  # ==========================================================
  datasource:
    url: jdbc:postgresql://localhost:5432/todo_ai_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.example.todoai: DEBUG
    org.springframework.ai: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %msg%n"